version: '3.8'

services:
  ga2:
    build: .
    image: ga2:latest
    container_name: ga2
    
    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # Volumes for persistent data
    volumes:
      - ./output:/app/output
      - ./src:/app/src
      - ./article:/app/article
    
    # Environment
    environment:
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - TF_CPP_MIN_LOG_LEVEL=2
      - CUDA_VISIBLE_DEVICES=0
    
    # Command can be overridden
    # docker-compose run ga2 python3 main.py --mode full --phase-1-generations 10 --phase-2-generations 100
